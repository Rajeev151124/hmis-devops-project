apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appointment
  template:
    metadata:
      labels:
        app: appointment
    spec:
      containers:
      - name: appointment
        image: rajeevreddy1511/appointment-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
